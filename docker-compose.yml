services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: triagetrace
    volumes:
      - triagetrace_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d triagetrace"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Do not expose 8000 externally. API traffic must go through the UI/nginx proxy
    # so that rate-limiting headers and tenant isolation can be enforced.
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/triagetrace
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  triagetrace_pgdata:
