services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Do not expose 8000 externally. API traffic must go through the UI/nginx proxy
    # so that rate-limiting headers and tenant isolation can be enforced.
    expose:
      - "8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ui:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
